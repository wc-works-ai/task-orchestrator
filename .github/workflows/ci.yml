name: CI

on:
  push:
    branches:
      - main
      - 'dev/**'
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24.x ships node:sqlite DatabaseSync (needed by the suite) and
      # satisfies the engines floor (>=22). Linux CI avoids the flaky Windows box.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint package scripts
        run: npm run pkg:lint

      - name: Typecheck
        run: npm run c

      # Unit + integration with the merged 100% branch-coverage gate.
      # Writes the html/lcov report to coverage/ and prints the text summary.
      - name: Unit + integration tests (100% coverage gate)
        run: npm run tc

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Build
        run: npm run b

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
